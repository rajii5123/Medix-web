<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediX Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MediX Dashboard 🌿🏥</h1>

<div class="dashboard-grid">

    <!-- Human Disease -->
    <div class="card">
        <h2>Human Disease</h2>
        <input type="file" id="humanImg">
        <button onclick="uploadHuman()">Analyze</button>
    </div>

    <!-- Plant Disease -->
    <div class="card">
        <h2>Plant Disease</h2>
        <input type="file" id="plantImg">
        <button onclick="uploadPlant()">Analyze</button>
    </div>

    <!-- Blood Report -->
    <div class="card">
        <h2>Blood Report</h2>
        <input type="file" id="reportFile">
        <button onclick="uploadReport()">Analyze</button>
    </div>

    <!-- Medicine Tracker -->
    <div class="card">
        <h2>Medicine Tracker</h2>
        <input type="text" id="medName" placeholder="Medicine Name">
        <input type="text" id="medTime" placeholder="Time">
        <button onclick="addMedicine()">Add</button>
        <ul id="medList"></ul>
    </div>

    <!-- Patient Health Notes -->
    <div class="card">
        <h2>Patient Health Notes</h2>
        <textarea id="healthNotes" placeholder="Enter notes"></textarea>
        <button onclick="saveHealthNotes()">Save Notes</button>
        <p id="healthMsg"></p>
    </div>

    <!-- Nearby Hospitals -->
    <div class="card">
        <h2>Nearby Hospitals</h2>
        <input type="text" id="location" placeholder="Enter City">
        <button onclick="findHospitals()">Search</button>
        <ul id="hospitalList"></ul>
    </div>

    <!-- Diet Planner -->
    <div class="card">
        <h2>Diet Planner</h2>
        <select id="dietCondition">
            <option value="">Select Condition</option>
            <option value="Anemia">Anemia</option>
            <option value="Normal">Normal</option>
            <option value="Diabetes">Diabetes</option>
        </select>
        <button onclick="showDiet()">Get Diet</button>
        <ul id="dietList"></ul>
    </div>

</div>

<h2 id="result"></h2>
<script src="script.js"></script>
</body>
</html>
</html>
