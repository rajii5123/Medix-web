<!DOCTYPE html>
<html>
<head>
    <title>MediX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MediX 🏥🌱</h1>

<div class="card">
    <h2>Human Disease</h2>
    <input type="file" id="humanImg">
    <button onclick="uploadHuman()">Analyze</button>
</div>

<div class="card">
    <h2>Plant Disease 🌿</h2>
    <input type="file" id="plantImg">
    <button onclick="uploadPlant()">Analyze</button>
</div>

<div class="card">
    <h2>Blood Report 📄</h2>
    <input type="file" id="reportFile">
    <button onclick="uploadReport()">Analyze</button>
</div>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
